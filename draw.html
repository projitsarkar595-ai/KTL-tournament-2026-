<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Live Tournament Draw</title>
<link rel="stylesheet" href="style.css">


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(
135deg,
#000814,
#001d3d,
#003566
);
min-height:100vh;
padding:20px;
color:white;
}

.container{
max-width:1200px;
margin:auto;
}

h1{
text-align:center;
color:#FFD60A;
font-size:3rem;
margin-bottom:10px;
}

.subtitle{
text-align:center;
opacity:.8;
margin-bottom:30px;
}

.draw-box{
background:rgba(255,255,255,.08);
padding:25px;
border-radius:25px;
backdrop-filter:blur(10px);
}

.slot-container{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
margin:30px 0;
flex-wrap:wrap;
}

.slot{
width:280px;
height:120px;
background:rgba(255,255,255,.08);
border:2px solid gold;
border-radius:20px;
display:flex;
justify-content:center;
align-items:center;
font-size:24px;
font-weight:bold;
}

.vs{
font-size:40px;
font-weight:bold;
color:#FFD60A;
}

button{
padding:15px 30px;
border:none;
border-radius:15px;
background:#FFD60A;
color:black;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
transform:scale(1.05);
}

.matches{
margin-top:30px;
}

.match{
background:rgba(255,255,255,.08);
padding:15px;
border-left:5px solid gold;
border-radius:10px;
margin-top:10px;
}

.admin{
text-align:center;
margin-top:20px;
}

.back{
margin-top:25px;
background:#00c853;
color:white;
}

</style>

</head>

<body>

<div class="container">

<h1>⚽ LIVE DRAW</h1>

<p class="subtitle">
Tournament Match Generator
</p>

<div class="draw-box">

<div class="slot-container">

<div
class="slot"
id="team1">

TEAM A

</div>

<div class="vs">

VS

</div>

<div
class="slot"
id="team2">

TEAM B

</div>

</div>

<div id="adminArea" class="admin">

<button onclick="startDraw()">
🎲 Start Draw
</button>

<br><br>

<button onclick="generateNextRound()">
➡️ Next Round
</button>

<br><br>

<button onclick="setChampionManual()">
🏆 Set Champion
</button>

<br><br>

<button onclick="logoutAdmin()">
🚪 Logout
</button>

</div>

</div>

<div
class="matches"
id="matches">

</div>

<button
class="back"
onclick="location.href='index.html'">

⬅ Back Home

</button>

</div>

<script>

if(
localStorage.getItem("admin")
!=="yes"
){

const area =
document.getElementById(
"adminArea"
);

if(area){

area.style.display="none";

}

}

</script>

<script type="module"
src="./firebase.js"></script>

</body>
</html>
